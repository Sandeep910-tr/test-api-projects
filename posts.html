<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Posts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1.05em;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 12px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 24px;
            font-size: 1.05em;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-img-top {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .post-id {
            font-size: 0.85em;
            color: #999;
            font-weight: 600;
        }

        .post-title {
            font-size: 1.05em;
            font-weight: 600;
            line-height: 1.4;
            margin: 6px 0 8px;
            color: #333;
            flex-grow: 1;
        }

        .post-comments {
            font-size: 0.9em;
            color: #555;
            font-weight: 600;
        }

        .post-link {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s ease;
            margin-top: auto;
            width: fit-content;
        }

        .card:hover .post-link {
            background: white;
            color: #667eea;
        }

        .card:hover .post-id,
        .card:hover .post-title,
        .card:hover .post-comments {
            color: rgba(255, 255, 255, 0.95);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        @media (max-width: 992px) {
            .posts-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Albums</a>
        <h1>📝 User Posts</h1>
        <div id="subtitle" class="subtitle">Loading posts...</div>

        <div id="posts-container" class="posts-grid">
            <div class="loading">Loading posts...</div>
        </div>
    </div>

    <script>
        async function loadPostsByUser() {
            try {
                const pathParts = window.location.pathname.split('/').filter(Boolean);
                let userId = null;

                if (pathParts[0] === 'posts' && pathParts[1]) {
                    userId = pathParts[1];
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    userId = urlParams.get('userId');
                }

                if (!userId) {
                    throw new Error('Invalid user id');
                }

                const [userResponse, postsResponse, commentsResponse] = await Promise.all([
                    fetch(`https://jsonplaceholder.typicode.com/users/${userId}`),
                    fetch(`https://jsonplaceholder.typicode.com/posts?userId=${userId}`),
                    fetch('https://jsonplaceholder.typicode.com/comments')
                ]);

                const user = await userResponse.json();
                const posts = await postsResponse.json();
                const comments = await commentsResponse.json();

                document.getElementById('subtitle').textContent = `Posts by ${user.name}`;

                const commentsByPost = comments.reduce((acc, comment) => {
                    acc[comment.postId] = (acc[comment.postId] || 0) + 1;
                    return acc;
                }, {});

                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                posts.forEach(post => {
                    const commentCount = commentsByPost[post.id] || 0;
                    const imageUrl = `https://picsum.photos/400/240?random=post-${post.id}`;
                    const postCard = document.createElement('div');
                    postCard.className = 'card';
                    postCard.innerHTML = `
                        <img src="${imageUrl}" class="card-img-top" alt="Post ${post.id} image">
                        <div class="card-body">
                            <div class="post-id">Post ID: ${post.id}</div>
                            <h5 class="post-title">${post.title}</h5>
                            <p class="post-comments">Comments: ${commentCount}</p>
                            <a href="/post/${post.id}" class="post-link">Go somewhere</a>
                        </div>
                    `;
                    container.appendChild(postCard);
                });

                if (posts.length === 0) {
                    container.innerHTML = '<div class="error">No posts found for this user.</div>';
                }
            } catch (error) {
                document.getElementById('subtitle').textContent = 'Unable to load posts';
                document.getElementById('posts-container').innerHTML = `
                    <div class="error">Error loading posts: ${error.message}</div>
                `;
            }
        }

        loadPostsByUser();
    </script>
</body>
</html>
