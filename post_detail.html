<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
        }
        
        .post-detail {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .post-header {
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .post-id {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
        }
        
        .post-author {
            font-size: 1em;
            color: #666;
            margin-bottom: 15px;
        }
        
        .post-title {
            font-size: 2em;
            font-weight: 700;
            color: #333;
            line-height: 1.3;
        }
        
        .post-image {
            margin: 30px 0;
            text-align: center;
        }
        
        .post-image img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .post-image img:hover {
            transform: scale(1.02);
        }
        
        .post-body {
            font-size: 1.1em;
            line-height: 1.8;
            color: #555;
            margin-top: 30px;
        }

        .comments-section {
            margin-top: 35px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
        }

        .albums-section {
            margin-top: 30px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
        }

        .albums-title {
            font-size: 1.25em;
            color: #333;
            margin-bottom: 14px;
        }

        .albums-list {
            display: grid;
            gap: 10px;
        }

        .album-item {
            background: #f9faff;
            border: 1px solid #e7eaff;
            border-radius: 8px;
            padding: 12px;
            color: #37406e;
            font-weight: 600;
        }

        .comments-title {
            font-size: 1.25em;
            color: #333;
            margin-bottom: 15px;
        }

        .comments-list {
            display: grid;
            gap: 12px;
        }

        .comment-item {
            background: #f8f9ff;
            border: 1px solid #e5e9ff;
            border-radius: 10px;
            padding: 14px;
        }

        .comment-name {
            font-weight: 700;
            color: #2f3f7a;
            margin-bottom: 6px;
        }

        .comment-email {
            font-size: 0.9em;
            color: #6e79a6;
            margin-bottom: 8px;
        }

        .comment-body {
            color: #444;
            line-height: 1.6;
        }
        
        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: white;
        }
        
        .error {
            background: #ff6b6b;
            border-radius: 10px;
        }
        
        .image-placeholder {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <a id="back-link" href="/posts" class="back-link">← Back to Posts</a>
        
        <div id="post-detail" class="post-detail">
            <div class="loading">Loading post details...</div>
        </div>
    </div>

    <script>
        async function loadPostDetail() {
            try {
                const pathParts = window.location.pathname.split('/').filter(Boolean);
                let postId = null;

                if (pathParts[0] === 'post' && pathParts[1]) {
                    postId = pathParts[1];
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    postId = urlParams.get('id');
                }
                
                if (!postId) {
                    throw new Error('Invalid post id');
                }
                
                // Fetch post details
                const postResponse = await fetch(`https://jsonplaceholder.typicode.com/posts/${postId}`);
                const post = await postResponse.json();

                const userId = post.userId;
                
                // Fetch user info to get post-specific image
                const userResponse = await fetch(`https://jsonplaceholder.typicode.com/users/${userId}`);
                const user = await userResponse.json();

                const backLink = document.getElementById('back-link');
                backLink.href = `/posts/${userId}`;

                const commentsResponse = await fetch(`https://jsonplaceholder.typicode.com/comments?postId=${postId}`);
                const comments = await commentsResponse.json();

                const albumsResponse = await fetch(`https://jsonplaceholder.typicode.com/albums?userId=${userId}`);
                const albums = await albumsResponse.json();
                
                const imageUrl = `https://picsum.photos/600/400?random=${postId}`;
                
                const detailContainer = document.getElementById('post-detail');
                const commentsMarkup = comments.map(comment => `
                    <div class="comment-item">
                        <div class="comment-name">${comment.name}</div>
                        <div class="comment-email">${comment.email}</div>
                        <div class="comment-body">${comment.body}</div>
                    </div>
                `).join('');

                const albumsMarkup = albums.map(album => `
                    <div class="album-item">Album ${album.id}: ${album.title}</div>
                `).join('');

                detailContainer.innerHTML = `
                    <div class="post-header">
                        <div class="post-id">Post ID: ${post.id}</div>
                        <div class="post-author">Author: ${user.name} (@${user.username})</div>
                        <div class="post-title">${post.title}</div>
                    </div>
                    
                    <div class="post-image">
                        <img src="${imageUrl}" alt="Post image" onerror="this.parentElement.innerHTML='<div class=\"image-placeholder\">📸 Image not available</div>'">
                    </div>
                    
                    <div class="post-body">
                        <strong>Content:</strong><br><br>
                        ${post.body}
                    </div>

                    <div class="comments-section">
                        <div class="comments-title">Comments (${comments.length})</div>
                        <div class="comments-list">
                            ${commentsMarkup || '<div>No comments found for this post.</div>'}
                        </div>
                    </div>

                    <div class="albums-section">
                        <div class="albums-title">Albums By ${user.name} (${albums.length})</div>
                        <div class="albums-list">
                            ${albumsMarkup || '<div>No albums found for this author.</div>'}
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('post-detail').innerHTML = `
                    <div class="error">Error loading post details: ${error.message}</div>
                `;
            }
        }

        loadPostDetail();
    </script>
</body>
</html>
