<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albums Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            color: white;
            margin: 10px 0 18px;
            font-size: 1.6em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.25);
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-img-top {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }
        
        .post-id {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .card:hover .post-id {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .post-author {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }
        
        .card:hover .post-author {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .post-title {
            font-size: 1.1em;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            flex-grow: 1;
        }

        .post-comments {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .album-meta {
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
        }

        .album-title {
            font-size: 1.05em;
            color: #333;
            line-height: 1.4;
            margin: 6px 0 10px;
            flex-grow: 1;
        }
        
        .post-link {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s ease;
            margin-top: auto;
            width: fit-content;
        }
        
        .card:hover .post-link {
            background: white;
            color: #667eea;
        }

        .card:hover .post-comments {
            color: rgba(255, 255, 255, 0.95);
        }

        .card:hover .album-meta,
        .card:hover .album-title {
            color: rgba(255, 255, 255, 0.95);
        }

        @media (max-width: 992px) {
            .posts-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Albums Dashboard</h1>
        <h2 class="section-title">Albums</h2>
        <div id="albums-container" class="posts-grid">
            <div class="loading">Loading albums...</div>
        </div>
    </div>

    <script>
        async function loadAlbums() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/albums');
                const albums = await response.json();

                const container = document.getElementById('albums-container');
                container.innerHTML = '';

                albums.forEach(album => {
                    const imageUrl = `https://picsum.photos/400/240?random=album-${album.id}`;
                    const albumCard = document.createElement('div');
                    albumCard.className = 'card';
                    albumCard.innerHTML = `
                        <a href="/posts/${album.userId}">
                            <img src="${imageUrl}" class="card-img-top" alt="Album ${album.id} image">
                        </a>
                        <div class="card-body">
                            <div class="album-meta">Album ID: ${album.id}</div>
                            <div class="album-meta">User ID: ${album.userId}</div>
                            <h5 class="album-title">${album.title}</h5>
                            <a href="/posts/${album.userId}" class="post-link">View Posts</a>
                        </div>
                    `;
                    container.appendChild(albumCard);
                });
            } catch (error) {
                document.getElementById('albums-container').innerHTML = `
                    <div class="error">Error loading albums: ${error.message}</div>
                `;
            }
        }

        loadAlbums();
    </script>
</body>
</html>
